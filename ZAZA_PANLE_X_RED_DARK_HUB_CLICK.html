<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZAZA PANLE VIP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle,#330000,#050505 70%);
overflow:hidden;
color:white;
}

.panel{

width:430px;

padding:30px;

border-radius:28px;

background:rgba(15,0,0,.85);

border:2px solid #ff0000;

box-shadow:
0 0 20px red,
0 0 55px rgba(255,0,0,.45);

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{
box-shadow:0 0 20px red;
}

to{
box-shadow:0 0 45px crimson;
}

}

h1{

text-align:center;

color:#ff2a2a;

font-size:30px;

text-shadow:0 0 15px red;

margin-bottom:12px;

}

.vip{

text-align:center;

padding:10px;

border-radius:14px;

background:#220000;

margin-bottom:18px;

border:1px solid red;

}

.card{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px;

margin:14px 0;

border-radius:18px;

background:rgba(255,255,255,.06);

transition:.3s;

}

.card:hover{

transform:scale(1.03);

box-shadow:0 0 18px red;

}

input[type=checkbox]{

width:24px;
height:24px;
accent-color:red;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:linear-gradient(90deg,#ff0000,#7a0000);

color:white;

font-size:18px;

cursor:pointer;

margin-top:18px;

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px red;

}

.footer{

text-align:center;

margin-top:18px;

opacity:.8;

}

</style>
</head>

<body>

<div class="panel">

<h1>⚡ ZAZA PANLE VIP ⚡</h1>

<div class="vip">
💎 RED DARK • VIP EDITION • CYBER UI 💎
</div>

<div class="card">
<span>🎮 VIP PANEL</span>
<input type="checkbox">
</div>

<div class="card">
<span>🔴 DPI 200</span>
<input type="checkbox">
</div>

<button>ENTER VIP ACCESS</button>

<div class="footer">
ULTRA RED DARK VERSION
</div>

</div>

</body>
</html>
