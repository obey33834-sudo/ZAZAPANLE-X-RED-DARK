<!DOCTYPE html><html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAZA PANLE VIP V1</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #001a33, #000814);
      color: #00d9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.panel {
  width: 360px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0, 20, 40, 0.8);
  box-shadow: 0 0 20px #00d9ff;
  border: 1px solid #00d9ff;
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
  text-shadow: 0 0 10px #00d9ff;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.box {
  background: rgba(0, 217, 255, 0.1);
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
  border: 1px solid rgba(0, 217, 255, 0.3);
}

.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
  font-size: 14px;
}

.switch {
  width: 40px;
  height: 20px;
  background: #003344;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 0 5px #00d9ff;
}

.circle {
  width: 18px;
  height: 18px;
  background: #00d9ff;
  border-radius: 50%;
  position: absolute;
  top: 1px;
  left: 1px;
  transition: 0.3s;
}

.switch.active .circle {
  left: 21px;
  background: #00ffcc;
}

  </style>
</head>
<body>  <div class="panel">
    <div class="title">ZAZA PANLE VIP V1</div>
    <div class="subtitle">ระบบพาแนล ✨ By : โอเบย์</div><div class="box">
  <div class="toggle">
    🧲 Toggle Feature 1
    <div class="switch" onclick="this.classList.toggle('active')">
      <div class="circle"></div>
    </div>
  </div>

  <div class="toggle">
    🎹 DPI Control
    <div class="switch" onclick="this.classList.toggle('active')">
      <div class="circle"></div>
    </div>
  </div>

  <div class="toggle">
    🔭 Scope Mode
    <div class="switch" onclick="this.classList.toggle('active')">
      <div class="circle"></div>
    </div>
  </div>

  <div class="toggle">
    🔎 Lock Mode
    <div class="switch" onclick="this.classList.toggle('active')">
      <div class="circle"></div>
    </div>
  </div>
</div>

  </div></body>
</html>
